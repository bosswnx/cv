name: Build and Deploy CV

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Install fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk fonts-linuxlibertine

      - name: Compile Chinese CV
        run: make zh

      - name: Compile English CV
        run: make en

      - name: Prepare site
        run: |
          mkdir -p _site
          cp template/cv-zh.pdf _site/cv-zh.pdf
          cp template/cv-en.pdf _site/cv-en.pdf
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>王诺贤 - 简历</title>
            <style>
              body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
              h1 { font-size: 2rem; margin-bottom: 0.5rem; }
              p { color: #555; margin-bottom: 2rem; }
              a { display: inline-block; margin: 8px 12px 8px 0; padding: 10px 22px;
                  background: #0070f3; color: #fff; border-radius: 6px; text-decoration: none; }
              a:hover { background: #005cc5; }
            </style>
          </head>
          <body>
            <h1>王诺贤</h1>
            <p>点击下方链接查看或下载简历 / Click a link below to view or download the CV.</p>
            <a href="cv-zh.pdf">中文简历 (PDF)</a>
            <a href="cv-en.pdf">English CV (PDF)</a>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
